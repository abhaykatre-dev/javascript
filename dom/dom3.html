<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: black; color: white ;"> 
    
</body>
<script>
    const div=document.createElement("div") //create a new div element
    console.log(div)
    div.className="box" //add class name to the
    div.id=Math.round(Math.random()*10+1)//add id to the div element
    div.setAttribute("title","genrated title") //add title attribute to the div element
    // div.title="This is a title" //change the title attribute of the div element
    div.style.color="blue"
    div.style.padding="20px"
    div.innerHTML="This is a new div element" //add text to the div element  //overwrite the existing text of the div element
    const addText=document.createTextNode("This is a text node") //create a text node
    div.appendChild(addText) //add the text node to the div element

    document.body.appendChild(div) //add the div element to the body of the document
</script>
</html>
