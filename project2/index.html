<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif ;
            background-color: rgb(184, 88, 19);
        }
        
        form {
          display: flex;
          flex-direction: column;
          border: 10px solid rgb(6, 3, 48);
          padding: 20px;
          align-items: center;
          background-color: bisque;
        }    
        form div {
            margin-bottom: 10px;
        }
      

        button {
            margin-top: 10px;
            align-self: center;
            background-color:rgb(0, 0, 0);
            color: white;
        }
        label {
            margin-right: 10px;
        }
        #result{
            
            margin: 10px auto;
            text-align: center;
            width: 150px;
            color: white;
            background-color: rgb(78, 26, 8);
        }
        #weight-guide {
            margin-top: 10px;
            text-align: center;
            background-color: yellow;
            padding: 10px;
            font-size: 10px;
        }
    </style>
</head>

<body>
    <form>
        <div>
            <label>Height in CM </label>
            <input type="text" id="height" placeholder="Enter your Height">
        </div>

        <div>
            <label>Weight in KG </label>
            <input type="text" id="weight" placeholder="Enter your Weight">
        </div>

        <button type="submit">Calculate</button>
        <div id="result"></div>
        <div id="weight-guide">
          <h3>BMI Weight Guide</h3>
          <p>Under Weight = Less than 18.6</p>
          <p>Normal Range = 18.6 and 24.9</p>
          <p>Overweight = Greater than 24.9</p>
        </div>
    </form>
    <script>
        const form =document.querySelector("form");
        form.addEventListener("submit",(e)=>{
            e.preventDefault();
            const height=parseInt(document.querySelector("#height").value);
            const weight=parseInt(document.querySelector("#weight").value);
            const result=document.querySelector("#result");
            if(isNaN(height)||height<=0 || height===""){
                result.textContent=`${height} is not a valid height`;
            }else if(isNaN(weight)||weight<=0 || weight===""){
                result.textContent=`${weight} is not a valid weight`;   
            }else{
                const bmi=((weight/height**2)*10000).toFixed(2);
                result.textContent=`Your BMI is ${bmi}`;
                if(bmi<18.6){
                    result.textContent+=`, you are underweight`;
                }else if(bmi>=18.6 && bmi<=24.9){
                    result.textContent+=`, you are in normal range`;
                }else{
                    result.textContent+=`, you are overweight`;
                }
            }
        })
    </script>
</body>

</html>
