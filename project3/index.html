<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* full screen height */
            background-color: #671919;
        }

        #banner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: blue;
            padding: 30px 50px;
            color: white;
            font-size: 20px;
            border-radius: 10px;
        }

        #clock {
            margin-top: 15px;
            font-size: 30px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="banner">
        Your Local Time
        <div id="clock"></div>
    </div>
</body>
<script>
    const clock = document.getElementById('clock');
    setInterval(function () {
        let date = new Date();
        clock.textContent = date.toLocaleTimeString();
    }, 1000);
</script>

</html>
