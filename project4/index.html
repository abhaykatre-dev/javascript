<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Number Guessing Game</title>
    <style>
        html {
            font-family: sans-serif;
        }

        body {
            width: 300px;
            max-width: 750px;
            min-width: 480px;
            margin: 0 auto;
            background-color: #d8a2a2;
        }

        .lastResult {
            color: white;
            padding: 7px;
        }

        .guesses {
            color: white;
            padding: 7px;
        }

        button {
            background-color: #141414;
            color: #fff;
            width: 250px;
            height: 50px;
            border-radius: 25px;
            font-size: 30px;
            border-style: none;
            margin-top: 30px;
            /* margin-left: 50px; */
        }

        #subt {
            background-color: #161616;
            color: #ffffff;
            width: 200px;
            height: 50px;
            border-radius: 10px;
            font-size: 20px;
            border-style: none;
            margin-top: 50px;
            /* margin-left: 75px; */
        }

        #guessField {
            color: #000;
            width: 250px;
            height: 50px;
            font-size: 30px;
            border-style: none;
            margin-top: 25px;

            /* margin-left: 50px; */
            border: 5px solid #6c6d6d;
            text-align: center;
        }

        #guess {
            font-size: 55px;
            /* margin-left: 90px; */
            margin-top: 120px;
            color: #fff;
        }


        #wrapper {
            box-sizing: border-box;
            text-align: center;
            width: 450px;
            height: 550px;
            background-color: #030257;
            color: #fff;
            font-size: 15px;
        }

        h1 {
            background-color: #000000;

            color: #fff;
            text-align: center;
            padding: 20px;
        }

        p {
            font-size: 16px;
            text-align: center;
        }

        .button {
            display: block;
            margin: 20px auto;
            text-align: center;
            cursor: pointer;
            padding: 10px 20px;
        }
    </style>
</head>

<body style="background-color:#212121; color:#fff;">

    <div id="wrapper">
        <h1>Number guessing game</h1>
        <p>Try and guess a random number between 1 and 100.</p>
        <p>You have 10 attempts to guess the right number.</p>
        </br>
        <form class="form">
            <label for="guessField" id="guess">Guess a number</label>
            <input type="text" id="guessField" class="guessField">
            <input type="submit" id="subt" value="Submit guess" class="guessSubmit">
        </form>

        <div class="resultParas">
            <p>Previous Guesses: <span class="guesses"></span></p>
            <p>Guesses Remaining: <span class="lastResult">10</span></p>
            <p class="lowOrHi"></p>
        </div>
    </div>

</body>
<script>
    const randomNumber = parseInt(Math.random() * 100 + 1);
    const userInput = document.querySelector("#guessField");
    const submitButton = document.querySelector("#subt");
    const guessSlot = document.querySelector(".guesses");
    const remaining = document.querySelector(".lastResult");
    const lowOrHi = document.querySelector(".lowOrHi");
    const resultParas = document.querySelector(".resultParas");

    const p = document.createElement('p');

    let prevGuess = [];
    let numGuess = 1;

    playGame = true;


    if (playGame) {
        submitButton.addEventListener("click", function (e) {
            e.preventDefault();
            const guess = parseInt(userInput.value);
            console.log(guess);
            validateGuess(guess);
        })
    }
    function validateGuess(guess) {
        if (isNaN(guess)) {
            alert("Please enter a valid number");
        }
        else if (guess < 1 || guess > 100) {
            alert("Please enter a number between 1 and 100");
        }
        else {
            if (numGuess > 10) {
                displayMessage("Game Over! You have exceeded the maximum number of guesses.");
                endGame();
                return;
            }
            prevGuess.push(guess);

            displayGuess(guess);
            checkGuess(guess);
        }

    }
    function displayGuess(guess) {
        userInput.value = "";
        guessSlot.innerHTML += guess + " , ";
        numGuess += 1;
        remaining.innerHTML = Math.max(0, 11 - numGuess);
    }
    function checkGuess(guess) {
        if (guess === randomNumber) {
            displayMessage("Congratulations! You guessed the number!");
            endGame();
        }
        else if (guess < randomNumber) {
            displayMessage("Too low! Try again.");
        }
        else {
            displayMessage("Too high! Try again.");
        }
    }
    function displayMessage(message) {
        lowOrHi.innerHTML = message;
    }
    function endGame() {
        userInput.value = "";
        userInput.setAttribute("disabled", true);
        submitButton.setAttribute("disabled", true);
        submitButton.style.backgroundColor = "#6c6d6d";
        p.classList.add("button")
        p.innerHTML = "Start New Game";
        p.style.backgroundColor = "#000000";
        p.style.color = "#fff";
        p.style.width = "200px";
        p.style.height = "50px";
        p.style.fontSize = "20px";
        p.style.borderRadius = "10px";
        p.style.borderStyle = "none";
        resultParas.appendChild(p);
        playGame = true;
        p.addEventListener("click", function () {
            newGame();
        });
    }
    function newGame() {
        const randomNumber = parseInt(Math.random() * 100 + 1);
        prevGuess = [];
        numGuess = 1;
        guessSlot.innerHTML = "";
        remaining.innerHTML = `${11 - numGuess}`;
        lowOrHi.innerHTML = "";
        userInput.removeAttribute("disabled");
        submitButton.removeAttribute("disabled");
        submitButton.style.backgroundColor = "#141414";
        resultParas.removeChild(p);
        playGame = true;
    }

</script>

</html>
